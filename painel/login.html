<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sartec — Acesso ao Painel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2a5e 0%, #0f1a3e 100%);
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      transition: transform .18s ease;
    }

    .login-card.shake {
      animation: shake .4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    @keyframes fade-out {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(.96); }
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-img {
      width: 160px;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    @media (max-width: 480px) {
      .logo-img { max-width: 160px; }
    }

    .login-subtitle {
      text-align: center;
      font-size: .82rem;
      color: #9aa0b4;
      margin-bottom: 32px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: #5a6380;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 7px;
    }

    .form-group input {
      width: 100%;
      border: 1.5px solid #e2e6f0;
      border-radius: 10px;
      padding: 11px 15px;
      font-family: inherit;
      font-size: .95rem;
      color: #1a1a2e;
      outline: none;
      transition: border-color .15s;
      background: #fafbfd;
      letter-spacing: .12em;
    }

    .form-group input:focus {
      border-color: #1a2a5e;
      background: #fff;
    }

    .error-msg {
      font-size: .78rem;
      color: #cc2222;
      margin-top: 8px;
      min-height: 18px;
      font-weight: 600;
    }

    .btn-login {
      width: 100%;
      background: #1a2a5e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: .04em;
      transition: background .15s, transform .1s;
    }

    .btn-login:hover  { background: #cc2222; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: default; }

    /* ── Loading pós-login ── */
    .loading-screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1e326f 0%, #0a1128 100%);
      padding: 32px 24px;
      z-index: 1000;
    }
    .loading-screen.visible {
      display: flex;
      animation: load-fade-in .28s ease forwards;
    }
    @keyframes load-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .loading-logo {
      width: 420px;
      max-width: 72vw;
      height: auto;
      object-fit: contain;
      margin-bottom: 48px;
      opacity: 1;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.35));
    }
    .loading-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      text-align: center;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }
    .loading-sub {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      max-width: 380px;
      line-height: 1.5;
      margin-bottom: 42px;
    }
    .progress-wrap {
      width: 320px;
      height: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 24px;
      padding: 1px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      border-radius: 99px;
      transition: width 0.35s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
    }
    .loading-step {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
      text-align: center;
      min-height: 20px;
    }
    @media (max-width: 480px) {
      .logo-img { width: 130px; }
      .loading-logo { width: 260px; max-width: 72vw; margin-bottom: 36px; }
      .loading-title { font-size: 1.45rem; }
      .loading-sub { font-size: 0.85rem; max-width: 280px; margin-bottom: 32px; }
      .progress-wrap { width: 240px; }
    }
  </style>
</head>
<body>

<div class="login-card" id="card">
  <div class="logo">
    <img src="/LOGO_SARTEC_OFICIAL_PNG.png" alt="Sartec Papelaria" class="logo-img">
  </div>
  <div class="login-subtitle">Painel de Atendimento</div>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label for="pwd">Senha de acesso</label>
      <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password" autofocus />
      <div class="error-msg" id="error-msg"></div>
    </div>
    <button type="submit" class="btn-login" id="btn-login">Entrar</button>
  </form>
</div>

<div class="loading-screen" id="loading-screen" aria-live="polite">
  <img src="/LOGO_SARTEC_OFICIAL_PNG.png" alt="Sartec Papelaria" class="loading-logo">
  <div class="loading-title">Preparando seu painel</div>
  <div class="loading-sub">Carregando informações do atendimento</div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="loading-step" id="loading-step">Carregando contatos...</div>
</div>

<script>
  const PANEL_PASSWORD = "sartec2026";

  // Se já autenticado, vai direto para o painel
  if (sessionStorage.getItem("sartec_auth") === "true") {
    location.replace("index.html");
  }

  function doLogin(e) {
    e.preventDefault();
    const pwd    = document.getElementById("pwd").value;
    const card   = document.getElementById("card");
    const errMsg = document.getElementById("error-msg");
    const btn    = document.getElementById("btn-login");

    if (pwd === PANEL_PASSWORD) {
      sessionStorage.setItem("sartec_auth", "true");
      sessionStorage.setItem("sartec_show_onboarding_after_login", "1");
      localStorage.removeItem("sartec_current_attendant");
      btn.disabled    = true;
      btn.textContent = "Entrando...";
      // Fade out suave do card; em seguida exibe o loading
      card.style.animation = "fade-out .3s ease forwards";
      setTimeout(showLoadingScreen, 300);
    } else {
      // Shake + mensagem de erro
      errMsg.textContent = "Senha incorreta. Tente novamente.";
      card.classList.remove("shake");
      void card.offsetWidth; // reflow para reiniciar a animação
      card.classList.add("shake");
      document.getElementById("pwd").value = "";
      document.getElementById("pwd").focus();
      setTimeout(() => errMsg.textContent = "", 3000);
    }
  }

  function showLoadingScreen() {
    const screen = document.getElementById("loading-screen");
    const fill   = document.getElementById("progress-fill");
    const step   = document.getElementById("loading-step");

    screen.classList.add("visible");

    const steps = [
      { text: "Carregando contatos...",         pct: "25%",  delay: 0   },
      { text: "Atualizando conversas...",       pct: "50%",  delay: 600 },
      { text: "Organizando prioridades...",     pct: "75%",  delay: 1200 },
      { text: "Preparando ambiente de atendimento...", pct: "100%", delay: 1800 },
    ];

    steps.forEach(({ text, pct, delay }) => {
      setTimeout(() => { step.textContent = text; fill.style.width = pct; }, delay);
    });

    // Timeout de conexão lenta caso demore mais do que 4000ms
    const slowConnTimeout = setTimeout(() => {
      step.textContent = "Conexão lenta. Ainda estamos tentando carregar...";
    }, 4500);

    // Redireciona após os passos (total 2100ms)
    setTimeout(() => {
      clearTimeout(slowConnTimeout);
      location.replace("index.html");
    }, 2200);
  }
</script>
</body>
</html>
